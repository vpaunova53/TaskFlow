<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow 🚀</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Outfit', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen pb-20">

    <div class="max-w-2xl mx-auto pt-16 px-4">
        <div class="mb-10 text-center animate__animated animate__fadeInDown">
            <h1 class="text-5xl font-bold text-white mb-2 drop-shadow-md">TaskFlow</h1>
            <p class="text-indigo-100 text-lg opacity-90">Real-time Python Dashboard</p>
        </div>

        <div class="glass-card p-2 rounded-2xl shadow-2xl mb-10 animate__animated animate__zoomIn">
            <div class="flex p-2 gap-3">
                <input type="text" id="taskInput" 
                    class="flex-1 px-5 py-4 bg-transparent text-slate-800 text-lg focus:outline-none placeholder:text-slate-400"
                    placeholder="What needs to be done? ✨">
                <button onclick="addTask()" 
                    class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-4 rounded-xl font-bold transition-all transform hover:scale-105 active:scale-95 shadow-lg">
                    Push Task
                </button>
            </div>
        </div>

        <div class="space-y-4" id="taskList">
            </div>
    </div>

    <script>
        // 1. LOAD: Fetch tasks from Python API
        async function loadTasks() {
            try {
                const response = await fetch('/api/tasks');
                const tasks = await response.json();
                const list = document.getElementById('taskList');
                
                if (tasks.length === 0) {
                    list.innerHTML = `
                        <div class="text-center text-white/60 py-20 animate__animated animate__fadeIn">
                            <p class="text-4xl mb-4">🏜️</p>
                            <p class="italic text-xl">The list is empty. Add a task to start the fire!</p>
                        </div>`;
                    return;
                }

                // Map tasks to HTML with a Delete button for each
                list.innerHTML = tasks.map((t, index) => `
                    <div class="glass-card p-5 rounded-xl flex justify-between items-center shadow-md animate__animated animate__fadeInUp" 
                         style="animation-delay: ${index * 0.1}s">
                        <div class="flex items-center gap-4">
                            <div class="h-3 w-3 rounded-full bg-indigo-500 animate-pulse"></div>
                            <span class="text-slate-800 text-lg font-semibold">${t.content}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="bg-indigo-50 text-indigo-500 px-3 py-1 rounded-md text-xs font-bold uppercase tracking-tight">ID #${t.id}</span>
                            <button onclick="deleteTask(${t.id})" 
                                class="text-slate-300 hover:text-red-500 transition-colors p-2 text-xl transform hover:scale-120"
                                title="Delete Task">
                                🗑️
                            </button>
                        </div>
                    </div>
                `).reverse().join('');
            } catch (error) {
                console.error("Communication error with server:", error);
            }
        }

        // 2. CREATE: Send new task to Python
        async function addTask() {
            const input = document.getElementById('taskInput');
            if (!input.value.trim()) return;

            await fetch('/api/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content: input.value })
            });
            input.value = '';
            loadTasks();
        }

        // 3. DELETE: Tell Python to remove a specific ID
        async function deleteTask(id) {
            // A simple browser confirmation prevents accidental deletes
            if(!confirm("Ready to mark this as complete and remove it?")) return;

            await fetch(`/api/tasks/${id}`, {
                method: 'DELETE'
            });
            
            // Refresh the UI to show the task is gone
            loadTasks();
        }

        // Run the load function immediately when page opens
        loadTasks();
    </script>
</body>
</html>
