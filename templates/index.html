<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TaskFlow Pro 🚀</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid #334155; }
        #chatBox::-webkit-scrollbar { width: 4px; }
        #chatBox::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10 animate__animated animate__fadeInDown">
            <h1 class="text-5xl font-bold mb-6 tracking-tight">TaskFlow <span class="text-indigo-500 text-3xl font-light italic">PRO</span></h1>
            
            <div class="flex flex-col md:flex-row justify-center items-center gap-3">
                <input type="text" id="taskInput" 
                    class="bg-slate-800 border border-slate-700 p-3 rounded-xl w-full md:w-80 text-white outline-none focus:ring-2 focus:ring-indigo-500" 
                    placeholder="New task description...">
                
                <select id="statusSelect" class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-white outline-none focus:ring-2 focus:ring-indigo-500 text-sm cursor-pointer">
                    <option value="todo">📋 To Do</option>
                    <option value="process">⚡ In Process</option>
                    <option value="done">✅ Done</option>
                </select>

                <button onclick="addTask()" 
                    class="bg-indigo-600 px-8 py-3 rounded-xl font-bold hover:bg-indigo-500 transition-all transform active:scale-95 shadow-lg">
                    Add to Board
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-card p-5 rounded-2xl min-h-[500px]">
                <h2 class="font-bold text-indigo-400 mb-6 uppercase tracking-widest text-sm flex items-center gap-2">
                    <span class="h-2 w-2 rounded-full bg-indigo-400 animate-pulse"></span> To Do
                </h2>
                <div id="todo-list" class="space-y-4"></div>
            </div>

            <div class="glass-card p-5 rounded-2xl min-h-[500px]">
                <h2 class="font-bold text-amber-400 mb-6 uppercase tracking-widest text-sm flex items-center gap-2">
                    <span class="h-2 w-2 rounded-full bg-amber-400 animate-pulse"></span> In Process
                </h2>
                <div id="process-list" class="space-y-4"></div>
            </div>

            <div class="glass-card p-5 rounded-2xl min-h-[500px]">
                <h2 class="font-bold text-emerald-400 mb-6 uppercase tracking-widest text-sm flex items-center gap-2">
                    <span class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span> Done
                </h2>
                <div id="done-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 right-6 w-80 glass-card rounded-2xl shadow-2xl overflow-hidden animate__animated animate__fadeInUp">
        <div class="bg-indigo-600 p-4 text-white font-bold flex justify-between items-center">
            <span>Assistant ✨</span>
        </div>
        <div id="chatBox" class="h-48 overflow-y-auto p-4 text-xs space-y-3 flex flex-col bg-slate-900/50">
            <p class="bg-slate-800 p-2 rounded-lg self-start">How can I help you today?</p>
        </div>
        <div class="p-3 bg-slate-900 flex gap-2">
            <input type="text" id="chatInput" class="bg-transparent flex-1 text-xs outline-none" placeholder="Ask me something..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" class="text-indigo-400 font-bold text-xs hover:text-indigo-300">SEND</button>
        </div>
    </div>

    <script>
        // Load and sort tasks into columns
        async function loadTasks() {
            const response = await fetch('/api/tasks');
            const tasks = await response.json();
            const columns = {
                todo: document.getElementById('todo-list'),
                process: document.getElementById('process-list'),
                done: document.getElementById('done-list')
            };

            // Clear UI before re-render
            Object.values(columns).forEach(col => col.innerHTML = '');

            tasks.forEach((t, i) => {
                const card = `
                    <div class="bg-slate-800/80 p-4 rounded-xl border border-slate-700 animate__animated animate__fadeInUp" style="animation-delay: ${i * 0.05}s">
                        <p class="text-sm font-medium text-slate-200 mb-4">${t.content}</p>
                        <div class="flex justify-between items-center">
                            <div class="flex gap-2">
                                ${t.status === 'todo' ? `<button onclick="updateStatus(${t.id}, 'process')" class="text-[10px] bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 px-3 py-1 rounded-lg hover:bg-indigo-600 hover:text-white transition-all">Start</button>` : ''}
                                ${t.status === 'process' ? `<button onclick="updateStatus(${t.id}, 'done')" class="text-[10px] bg-emerald-600/20 text-emerald-400 border border-emerald-500/30 px-3 py-1 rounded-lg hover:bg-emerald-600 hover:text-white transition-all">Finish</button>` : ''}
                                ${t.status !== 'todo' ? `<button onclick="updateStatus(${t.id}, 'todo')" class="text-[10px] bg-slate-700/50 text-slate-400 px-3 py-1 rounded-lg hover:bg-slate-600">Reset</button>` : ''}
                            </div>
                            <button onclick="deleteTask(${t.id})" class="text-slate-500 hover:text-red-400 transition-colors">🗑️</button>
                        </div>
                    </div>`;
                columns[t.status].innerHTML += card;
            });
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            const statusSelect = document.getElementById('statusSelect');
            if (!input.value.trim()) return;

            await fetch('/api/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    content: input.value,
                    status: statusSelect.value 
                })
            });
            input.value = '';
            loadTasks();
        }

        async function updateStatus(id, newStatus) {
            await fetch(`/api/tasks/${id}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: newStatus })
            });
            loadTasks();
        }

        async function deleteTask(id) {
            await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
            loadTasks();
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const chatBox = document.getElementById('chatBox');
            const msg = input.value.trim();
            if (!msg) return;

            chatBox.innerHTML += `<p class="bg-indigo-600 p-2 rounded-lg self-end ml-8">${msg}</p>`;
            input.value = '';

            const resp = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msg })
            });
            const data = await resp.json();
            chatBox.innerHTML += `<p class="bg-slate-800 p-2 rounded-lg self-start mr-8"><b>Bot:</b> ${data.reply}</p>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        loadTasks();
    </script>
</body>
</html>
